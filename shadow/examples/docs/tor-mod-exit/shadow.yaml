general:
  stop_time: 120 min
network:
  graph:
    type: gml
    inline: |
      graph [
        directed 0
        node [
          id 0
          host_bandwidth_down "1 Gbit"
          host_bandwidth_up "1 Gbit"
        ]
        edge [
          source 0
          target 0
          latency "50 ms"
          jitter "0 ms"
          packet_loss 0.0
        ]
      ]
hosts:
  verifier:
    network_node_id: 0
    processes:
    - path: python3
      args: -u /home/asusms/tor_project/verifier_shadow_fixed.py
      start_time: 1
      expected_final_state: running
  4uthority:
    network_node_id: 0
    ip_addr: 100.0.0.1
    processes:
    - path: /home/asusms/tor_project/tor/src/app/tor
      args: --Address 4uthority --Nickname 4uthority
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1
      expected_final_state: running
  exit1:
    network_node_id: 0
    processes:
    - path: /home/asusms/tor_project/tor/src/app/tor
      args: --Address exit1 --Nickname exit1 --defaults-torrc torrc-defaults -f torrc --ExitRelay 1 --ExitPolicy "accept *:*"
      start_time: 60
      expected_final_state: running
      environment: { IS_MALICIOUS: "3" }
